<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal website">
  <title>Personal Website</title>

  <!-- Google Fonts: Plus Jakarta Sans (judul) + Inter (teks) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap">

  <!-- pdfmake (client-side PDF generator) — versi 0.2.x via jsDelivr CDN -->
  <!-- WAJIB DIUJI DI BROWSER: font Roboto dari vfs_fonts harus ter-load sebelum createPdf dipanggil -->
  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2/build/pdfmake.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2/build/vfs_fonts.js"></script>

  <!-- ============================================================
       CSS INLINE — KHUSUS HALAMAN PUBLIK (index)
       Tidak terhubung ke css/styles.css (masih dipakai admin.html).
       ============================================================ -->
  <style>
    /* =====================================================
       RESET & DASAR
       ===================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* =====================================================
       VARIABEL DESAIN — Navy + Teal + Emas (konsisten dgn admin)
       ===================================================== */
    :root {
      --warna-utama:      #1E3A5F;
      --warna-aksen:      #0F766E;
      --warna-aksen-2:    #1E3A5F;
      --warna-emas:       #C9A227;
      --warna-aksen-muda: #EAF1EE;
      --warna-teks:       #1A2433;
      --warna-teks-muda:  #5A6B7B;
      --warna-latar:      #FBFAF6;
      --warna-kartu:      #FFFFFF;
      --warna-garis:      #E5E2D8;

      --gradien-utama: linear-gradient(135deg, #1E3A5F, #0F766E);

      --radius:       14px;
      --radius-besar: 22px;
      --radius-penuh: 999px;

      --bayangan-sm: 0 1px 3px rgba(30,58,95,.08);
      --bayangan:    0 6px 20px rgba(30,58,95,.10);
      --bayangan-lg: 0 16px 40px rgba(30,58,95,.16);

      --transisi: .25s cubic-bezier(.4,0,.2,1);

      --font-judul: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-utama: 'Inter', system-ui, -apple-system, sans-serif;

      --warna-bahaya:     #C0392B;
      --warna-sukses:     #15803D;
      --warna-peringatan: #B45309;
    }

    /* =====================================================
       DASAR HALAMAN
       ===================================================== */
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-utama);
      background-color: var(--warna-latar);
      color: var(--warna-teks);
      line-height: 1.65;
      font-size: 16px;
      /* Mencegah konten melompat saat scrollbar muncul */
      overflow-x: hidden;
    }

    a {
      color: var(--warna-aksen);
      text-decoration: none;
      transition: color var(--transisi);
    }
    a:hover {
      color: var(--warna-utama);
      text-decoration: underline;
    }

    img { max-width: 100%; height: auto; display: block; }
    ul, ol { list-style: none; }

    h1, h2, h3 {
      font-family: var(--font-judul);
      line-height: 1.2;
    }
    h1 { font-size: clamp(1.7rem, 5vw, 2.8rem); font-weight: 800; }
    h2 { font-size: clamp(1.2rem, 3vw, 1.7rem); font-weight: 700; }
    h3 { font-size: clamp(1rem, 2vw, 1.2rem); font-weight: 700; }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* =====================================================
       NAVBAR — sticky, muncul saat scroll (via JS), latar blur
       ===================================================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      /* Awalnya transparan; JS menambahkan .navbar--solid saat scroll */
      background: transparent;
      transition: background var(--transisi), box-shadow var(--transisi);
      padding: 0.9rem 0;
      /* Diperlukan agar panel dropdown mobile (position:absolute) mengacu ke sini */
    }

    /* Navbar solid setelah scroll (ditambahkan via JS) */
    .navbar--solid {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 var(--warna-garis), var(--bayangan-sm);
    }

    .navbar__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    /* Inisial/nama di kiri navbar */
    .navbar__brand {
      font-family: var(--font-judul);
      font-size: 1rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      transition: color var(--transisi);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .navbar--solid .navbar__brand {
      color: var(--warna-utama);
    }

    /* Tautan navigasi anchor — desktop */
    .navbar__links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .navbar__link {
      font-size: 0.85rem;
      font-weight: 600;
      font-family: var(--font-judul);
      color: rgba(255,255,255,0.85);
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-penuh);
      transition: all var(--transisi);
      text-decoration: none;
    }

    .navbar__link:hover {
      color: white;
      background: rgba(255,255,255,0.15);
      text-decoration: none;
    }

    .navbar--solid .navbar__link {
      color: var(--warna-teks-muda);
    }
    .navbar--solid .navbar__link:hover {
      color: var(--warna-utama);
      background: var(--warna-aksen-muda);
    }

    /* =====================================================
       HAMBURGER — tombol buka menu mobile
       ===================================================== */
    .navbar__toggle {
      display: none; /* disembunyikan di desktop */
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: var(--radius);
      cursor: pointer;
      color: rgba(255,255,255,0.9);
      transition: background var(--transisi), border-color var(--transisi), color var(--transisi);
      flex-shrink: 0;
    }

    .navbar__toggle:hover {
      background: rgba(255,255,255,0.15);
      border-color: white;
      color: white;
    }

    .navbar__toggle:focus-visible {
      outline: 2px solid white;
      outline-offset: 2px;
    }

    .navbar--solid .navbar__toggle {
      border-color: var(--warna-aksen);
      color: var(--warna-utama);
    }

    .navbar--solid .navbar__toggle:hover {
      background: var(--warna-aksen-muda);
      border-color: var(--warna-utama);
    }

    .navbar--solid .navbar__toggle:focus-visible {
      outline-color: var(--warna-utama);
    }

    /* Tombol Admin — HANYA desktop (sembunyikan di mobile via media query) */
    .navbar__admin {
      font-size: 0.8rem;
      font-weight: 700;
      font-family: var(--font-judul);
      padding: 0.4rem 1rem;
      border-radius: var(--radius-penuh);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      transition: all var(--transisi);
      white-space: nowrap;
    }
    .navbar__admin:hover {
      border-color: white;
      color: white;
      background: rgba(255,255,255,0.15);
      text-decoration: none;
    }
    .navbar--solid .navbar__admin {
      border-color: var(--warna-aksen);
      color: var(--warna-utama);
    }
    .navbar--solid .navbar__admin:hover {
      background: var(--warna-aksen);
      color: white;
      border-color: var(--warna-aksen);
    }

    /* =====================================================
       PANEL MENU MOBILE — dropdown di bawah navbar
       Ditampilkan saat .navbar__links--terbuka aktif.
       Hanya berlaku di mobile (≤768px); di desktop, aturan
       ini tidak dipakai karena hamburger tidak terlihat dan
       class tidak pernah di-toggle.
       ===================================================== */
    @media (max-width: 768px) {
      /* Sembunyikan tombol Admin di semua kondisi mobile */
      .navbar__admin {
        display: none !important;
      }

      /* Tampilkan tombol hamburger */
      .navbar__toggle {
        display: flex;
      }

      /* Panel link: sembunyikan secara default */
      .navbar__links {
        display: flex;              /* tetap flex agar item tersusun */
        flex-direction: column;
        gap: 0;
        position: absolute;
        top: 100%;                  /* tepat di bawah navbar */
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.97);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(30,58,95,.14), 0 1px 0 var(--warna-garis);
        border-radius: 0 0 var(--radius-besar) var(--radius-besar);
        padding: 0.5rem 0 0.75rem;
        z-index: 199;               /* di bawah navbar (z-index 200) tapi di atas hero */

        /* State tersembunyi: geser ke atas + opacity 0 */
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        visibility: hidden;
        transition:
          opacity .22s cubic-bezier(.4,0,.2,1),
          transform .22s cubic-bezier(.4,0,.2,1),
          visibility 0s linear .22s;
      }

      /* State terbuka */
      .navbar__links--terbuka {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        visibility: visible;
        transition:
          opacity .22s cubic-bezier(.4,0,.2,1),
          transform .22s cubic-bezier(.4,0,.2,1),
          visibility 0s linear 0s;
      }

      /* Setiap link di panel mobile */
      .navbar__link {
        display: block;
        color: var(--warna-teks) !important;
        font-size: 0.95rem;
        padding: 0.75rem 1.5rem;
        border-radius: 0;
        transition: background var(--transisi), color var(--transisi);
      }

      .navbar__link:hover,
      .navbar__link:focus-visible {
        background: var(--warna-aksen-muda);
        color: var(--warna-utama) !important;
        text-decoration: none;
      }

      .navbar__link:focus-visible {
        outline: 2px solid var(--warna-aksen);
        outline-offset: -2px;
      }
    }

    /* Hormati prefers-reduced-motion: hapus transisi panel */
    @media (prefers-reduced-motion: reduce) {
      .navbar__links {
        transition: none !important;
      }
    }

    /* =====================================================
       HERO — besar, gradien, dekorasi blob
       ===================================================== */
    .hero {
      min-height: 100svh;
      background: var(--gradien-utama);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 7rem 0 5rem; /* ruang atas untuk navbar */
    }

    /* Blob dekorasi 1 — kanan atas */
    .hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -100px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(255,255,255,.14) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Blob dekorasi 2 — kiri bawah */
    .hero::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -60px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(15,118,110,.28) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Blob dekorasi 3 — tengah (via elemen anak) */
    .hero__blob-mid {
      position: absolute;
      top: 30%;
      left: 20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero__inner {
      display: flex;
      align-items: center;
      gap: 3.5rem;
      position: relative;
      z-index: 1;
    }

    /* Kolom kiri: foto */
    .hero__foto-col {
      flex-shrink: 0;
    }

    /* Foto bundar dengan ring + bayangan */
    .hero__foto-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }

    /* Ring terluar (gradien animasi halus) */
    .hero__foto-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(255,255,255,.6) 0%, rgba(201,162,39,.7) 40%, rgba(255,255,255,.6) 100%);
      animation: putarRing 8s linear infinite;
    }

    @keyframes putarRing {
      to { transform: rotate(360deg); }
    }

    .hero__foto {
      position: relative;
      z-index: 1;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid rgba(255,255,255,0.95);
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
      background: rgba(255,255,255,.15);
    }

    /* Placeholder saat tidak ada foto */
    .hero__foto-placeholder {
      position: relative;
      z-index: 1;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      border: 5px solid rgba(255,255,255,0.7);
      box-shadow: 0 20px 50px rgba(0,0,0,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: rgba(255,255,255,0.75);
    }

    /* Kolom kanan: info */
    .hero__info {
      flex: 1;
      min-width: 0;
    }

    /* Label kecil di atas nama */
    .hero__label {
      display: inline-block;
      font-family: var(--font-judul);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.75);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      padding: 0.3rem 0.85rem;
      border-radius: var(--radius-penuh);
      margin-bottom: 1rem;
    }

    /* Nama lengkap dengan gelar — gradien teks */
    .hero__nama {
      font-family: var(--font-judul);
      font-weight: 800;
      color: white;
      letter-spacing: -.02em;
      margin-bottom: 0.5rem;
      word-break: break-word;
      border-bottom: 2px solid var(--warna-emas);
      padding-bottom: 0.3rem;
      display: inline-block;
    }

    .hero__profesi {
      font-size: 1.05rem;
      font-weight: 500;
      color: rgba(255,255,255,.9);
      margin-bottom: 0.35rem;
    }

    .hero__institusi {
      font-size: 0.95rem;
      color: rgba(255,255,255,.8);
      margin-bottom: 0.25rem;
    }

    .hero__nuptk {
      font-size: 0.82rem;
      color: rgba(255,255,255,.65);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
      margin-bottom: 0.35rem;
    }

    .hero__email a {
      font-size: 0.9rem;
      color: rgba(255,255,255,.9);
      text-underline-offset: 3px;
      text-decoration: underline dotted rgba(255,255,255,.5);
    }
    .hero__email a:hover {
      color: white;
      text-decoration: underline;
    }

    /* Chip sosial media */
    .sosmed-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.35rem;
    }

    .sosmed-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.95rem;
      border-radius: var(--radius-penuh);
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.3);
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font-judul);
      text-decoration: none;
      transition: background var(--transisi), transform var(--transisi), box-shadow var(--transisi);
      backdrop-filter: blur(4px);
    }

    .sosmed-chip:hover {
      background: rgba(255,255,255,.32);
      color: white;
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,.15);
    }

    .sosmed-chip__badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.5em;
      font-size: 0.7rem;
      font-weight: 800;
      background: rgba(255,255,255,.28);
      border-radius: 4px;
      padding: 0 0.25em;
      line-height: 1.6;
    }

    /* Tombol CTA di hero */
    .hero__cta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.5rem;
      border-radius: var(--radius-penuh);
      font-family: var(--font-judul);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transisi);
      text-decoration: none;
      letter-spacing: .01em;
      border: none;
    }

    /* CTA utama — putih solid */
    .cta-btn--utama {
      background: white;
      color: var(--warna-utama);
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
    }

    .cta-btn--utama:hover {
      background: var(--warna-aksen-muda);
      color: var(--warna-utama);
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }

    /* CTA sekunder — outline putih */
    .cta-btn--outline {
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,.6);
    }

    .cta-btn--outline:hover {
      background: rgba(255,255,255,.15);
      border-color: white;
      color: white;
      text-decoration: none;
      transform: translateY(-2px);
    }

    /* Petunjuk scroll bawah */
    .hero__scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      color: rgba(255,255,255,.6);
      font-size: 0.75rem;
      font-family: var(--font-judul);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      z-index: 1;
      animation: turunNaik 2s ease-in-out infinite;
    }

    .hero__scroll-hint svg {
      animation: turunNaik 2s ease-in-out infinite;
    }

    @keyframes turunNaik {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* =====================================================
       SEKSI UTAMA — layout & judul bersama
       ===================================================== */
    .seksi {
      padding: 5rem 0;
    }

    .seksi + .seksi {
      border-top: 1px solid var(--warna-garis);
    }

    /* Penanda judul seksi dgn blok aksen gradien */
    .seksi__judul {
      font-family: var(--font-judul);
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      font-weight: 800;
      color: var(--warna-utama);
      margin-bottom: 2.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .seksi__judul::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 1.2em;
      background: var(--warna-emas);
      border-radius: var(--radius-penuh);
      flex-shrink: 0;
    }

    .seksi__judul::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, var(--warna-aksen-muda), transparent);
      border-radius: 1px;
    }

    /* =====================================================
       SEKSI TENTANG — bio
       ===================================================== */
    #seksi-tentang .bio-teks {
      max-width: 680px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--warna-teks);
      white-space: pre-wrap;
    }

    /* =====================================================
       KARTU PENELITIAN / PENGABDIAN
       ===================================================== */
    .kartu-grid {
      display: grid;
      gap: 1.25rem;
    }

    .kartu {
      background: var(--warna-kartu);
      border-radius: var(--radius-besar);
      padding: 1.75rem 1.75rem 1.75rem 2.1rem;
      box-shadow: var(--bayangan);
      border: 1px solid var(--warna-garis);
      position: relative;
      overflow: hidden;
      transition: transform var(--transisi), box-shadow var(--transisi);
    }

    /* Aksen garis kiri emas */
    .kartu::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--warna-emas);
      border-radius: var(--radius-besar) 0 0 var(--radius-besar);
    }

    .kartu:hover {
      transform: translateY(-4px);
      box-shadow: var(--bayangan-lg);
    }

    .kartu__tahun {
      display: inline-block;
      font-family: var(--font-judul);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--warna-aksen);
      background: var(--warna-aksen-muda);
      padding: 0.2rem 0.65rem;
      border-radius: var(--radius-penuh);
      margin-bottom: 0.6rem;
      border: 1px solid var(--warna-emas);
    }

    .kartu__judul {
      font-family: var(--font-judul);
      font-size: 1rem;
      font-weight: 700;
      color: var(--warna-teks);
      margin-bottom: 0.75rem;
      line-height: 1.45;
    }

    .kartu__tautan {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--warna-utama);
      border: 1.5px solid var(--warna-aksen);
      padding: 0.35rem 0.9rem;
      border-radius: var(--radius-penuh);
      transition: all var(--transisi);
      text-decoration: none;
    }

    .kartu__tautan:hover {
      background: var(--warna-aksen);
      color: white;
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15,118,110,.3);
    }

    /* =====================================================
       GALERI — grid foto dgn hover overlay
       ===================================================== */
    .galeri-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .galeri-item {
      background: var(--warna-kartu);
      border-radius: var(--radius-besar);
      overflow: hidden;
      box-shadow: var(--bayangan);
      border: 1px solid var(--warna-garis);
      cursor: pointer;
      position: relative;
      transition: transform var(--transisi), box-shadow var(--transisi);
    }

    .galeri-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--bayangan-lg);
    }

    .galeri-item__gambar-wrap {
      position: relative;
      overflow: hidden;
      height: 185px;
    }

    .galeri-item__gambar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--warna-latar);
      transition: transform .4s cubic-bezier(.4,0,.2,1);
      display: block;
    }

    .galeri-item:hover .galeri-item__gambar {
      transform: scale(1.07);
    }

    /* Overlay caption saat hover */
    .galeri-item__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(30,58,95,.85) 0%, transparent 55%);
      opacity: 0;
      transition: opacity var(--transisi);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .galeri-item:hover .galeri-item__overlay {
      opacity: 1;
    }

    .galeri-item__overlay-teks {
      color: white;
      font-family: var(--font-judul);
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .galeri-item__info {
      padding: 0.85rem 1rem;
    }

    .galeri-item__judul {
      font-family: var(--font-judul);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--warna-teks);
      margin-bottom: 0.2rem;
    }

    .galeri-item__keterangan {
      font-size: 0.78rem;
      color: var(--warna-teks-muda);
    }

    /* Lightbox sederhana */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,20,30,.92);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;

      max-height: 80vh;

    .lightbox__tutup {

      bottom: 1.5rem;

    /* =====================================================
       STATUS LOADING & KOSONG
       ===================================================== */
    .status-loading {
      text-align: center;

      font-size: 0.95rem;
    }

      width: 36px;
      height: 36px;
      border: 3.5px solid var(--warna-aksen-muda);
      border-top-color: var(--warna-aksen);
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes putar { to { transform: rotate(360deg); } }

    .status-kosong {
      text-align: center;
      padding: 2rem;
      color: var(--warna-teks-muda);
      font-size: 0.9rem;
    }

    /* =====================================================
       TOMBOL UNDUH CV — loading state
       ===================================================== */
    .cta-btn--cv-loading {
      opacity: 0.65;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* =====================================================
       TOAST
       ===================================================== */
    #toast-container {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-width: 340px;
    }

    .toast {
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius);
      background: var(--warna-kartu);
      color: var(--warna-teks);
      font-size: 0.88rem;
      box-shadow: var(--bayangan-lg);
      animation: slideInToast .3s var(--transisi) both;
      border-left: 4px solid var(--warna-aksen);
      word-break: break-word;
    }

    .toast--gagal { border-left-color: var(--warna-bahaya); }

    @keyframes slideInToast {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* =====================================================
       ANIMASI MASUK (reveal via IntersectionObserver)
       ===================================================== */
    /*
      State awal elemen yang akan dianimasikan.
      PENTING: bila JS tidak berjalan atau reduced-motion aktif,
      kelas .akan-reveal TIDAK ditambahkan (lihat JS), sehingga
      elemen tetap terlihat (opacity default = 1).
    */
    .akan-reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .55s cubic-bezier(.4,0,.2,1), transform .55s cubic-bezier(.4,0,.2,1);
    }

    .sudah-reveal {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    /* =====================================================
       AKSESIBILITAS — kurangi gerakan
       ===================================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      /* Pastikan elemen tetap terlihat */
      .akan-reveal {
        opacity: 1 !important;
        transform: none !important;
      }
    }

    /* =====================================================

      }

        grid-template-columns: 1fr 1fr;
      }

      .galeri-item__gambar-wrap {
        height: 140px;
      }
    }

  <script>
    'use strict';

    /* =====================================================
       KONFIGURASI API
       =====================================================
       Ganti nilai API_URL di bawah dengan URL Web App GAS Anda.
       Cara mendapatkan URL:
         1. Buka project GAS
         2. Klik Deploy → New deployment / Manage deployments
         3. Pilih Web app, Execute as: Me, Access: Anyone
         4. Salin URL yang muncul dan tempel di sini.

       CATATAN: Panel admin menggunakan konfigurasi terpisah
       di file js/config.js — jangan diubah dari sini.
    */
    const API_URL = 'https://script.google.com/macros/s/AKfycbytqwEJ8gobN0-iThy5hE6Egdm4Lb1yrcezZl1u-_n6UO6Yud65W3jw3vJR8TllisfB/exec';

    // Penanda placeholder — diganti pengguna setelah deploy
    const API_URL_PLACEHOLDER = 'GANTI_DENGAN_URL_WEB_APP_GAS';

    /* =====================================================
       DEFINISI SOSIAL MEDIA
       ===================================================== */
    const SOSMED_DEF = [
      { key: 'sosmed_facebook',  label: 'Facebook',       badge: 'FB' },
      { key: 'sosmed_instagram', label: 'Instagram',      badge: 'IG' },
      { key: 'sosmed_tiktok',    label: 'TikTok',         badge: 'TT' },
      { key: 'sosmed_linkedin',  label: 'LinkedIn',       badge: 'in' },
      { key: 'sosmed_youtube',   label: 'YouTube',        badge: 'YT' },
      { key: 'sosmed_scholar',   label: 'Google Scholar', badge: 'GS' },
      { key: 'sosmed_garuda',    label: 'Garuda',         badge: 'Garuda' }
    ];

    /* =====================================================
       PENYIMPAN DATA CV (scope global skrip ini)
       Diisi oleh init() setelah data berhasil dimuat.
       generateCV() membacanya tanpa fetch ulang.
       ===================================================== */
    let _cvData = null; // { profil, penelitian, pengabdian, dokumen }

    /* =====================================================
       UTILITAS
       ===================================================== */

    /** Escape HTML untuk mencegah XSS. */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /** Format ukuran file ke KB/MB. */
    function formatUkuran(bytes) {
      if (!bytes || isNaN(bytes)) return '';
      const n = Number(bytes);
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(1) + ' MB';
    }

    /** Tampilkan toast notifikasi. */
    function tampilToast(pesan, tipe = 'info', durasi = 4500) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const el = document.createElement('div');
      el.className = `toast toast--${tipe}`;
      el.textContent = pesan;
      container.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.remove(); }, durasi);
    }

    /* =====================================================
       POLA CORS GAS
       =====================================================
       POST dengan Content-Type: text/plain;charset=utf-8 dan
       body berupa JSON.stringify(payload). Pola ini menghindari
       preflight OPTIONS yang tidak didukung GAS.
       Token TIDAK diperlukan untuk aksi getPublic (publik).
       WAJIB DIUJI MANUAL dari URL yang dihosting (GitHub Pages
       atau hosting lain) — tidak bisa dites dari file:// lokal.
    */
    async function apiPublik() {
      const body = JSON.stringify({ action: 'getPublic' });
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      return res.json();
    }

    /* =====================================================
       NAVBAR — solid saat scroll
       ===================================================== */
    (function initNavbar() {
      const nav = document.getElementById('navbar');
      if (!nav) return;
      function updateNavbar() {
        if (window.scrollY > 60) {
          nav.classList.add('navbar--solid');
        } else {
          nav.classList.remove('navbar--solid');
        }
      }
      window.addEventListener('scroll', updateNavbar, { passive: true });
      updateNavbar();
    })();

    /* =====================================================
       HAMBURGER — toggle menu mobile
       ===================================================== */
    (function initHamburger() {
      var toggle = document.getElementById('navbar-toggle');
      var links  = document.getElementById('navbar-links');
      if (!toggle || !links) return;

      var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) {
        /* Tanpa transisi: hapus class transisi sebelum toggle */
        links.style.transition = 'none';
      }

      function bukaMenu() {
        links.classList.add('navbar__links--terbuka');
        toggle.setAttribute('aria-expanded', 'true');
        toggle.setAttribute('aria-label', 'Tutup menu');
      }

      function tutupMenu() {
        links.classList.remove('navbar__links--terbuka');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Buka menu');
      }

      function menuTerbuka() {
        return links.classList.contains('navbar__links--terbuka');
      }

      /* Klik hamburger: toggle buka/tutup */
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menuTerbuka()) {
          tutupMenu();
        } else {
          bukaMenu();
        }
      });

      /* Klik di luar navbar: tutup menu */
      document.addEventListener('click', function(e) {
        if (!menuTerbuka()) return;
        var nav = document.getElementById('navbar');
        if (nav && !nav.contains(e.target)) {
          tutupMenu();
        }
      });

      /* Tekan Escape: tutup menu */
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menuTerbuka()) {
          tutupMenu();
          toggle.focus();
        }
      });

      /* Klik salah satu link menu: tutup menu, biarkan smooth-scroll handler bekerja */
      links.addEventListener('click', function(e) {
        var link = e.target.closest('a.navbar__link');
        if (link && menuTerbuka()) {
          tutupMenu();
        }
      });

      /* Saat resize ke desktop (>768px): pastikan menu tertutup & aria bersih */
      var mq = window.matchMedia('(max-width: 768px)');
      function onMqChange(ev) {
        if (!ev.matches) {
          /* Kembali ke desktop — bersihkan state mobile */
          tutupMenu();
        }
      }
      /* addEventListener dengan EventListener object lebih luas didukung */
      if (typeof mq.addEventListener === 'function') {
        mq.addEventListener('change', onMqChange);
      } else if (typeof mq.addListener === 'function') {
        /* fallback untuk browser lama */
        mq.addListener(onMqChange);
      }
    })();

    /* =====================================================
       SMOOTH SCROLL untuk tautan anchor di navbar
       ===================================================== */
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a[href^="#"]');
      if (!link) return;
      var href = link.getAttribute('href');
      if (!href || href === '#') {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      const target = document.querySelector(href);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    /* =====================================================
       LIGHTBOX GALERI
       ===================================================== */
    (function initLightbox() {
      const lb     = document.getElementById('lightbox');
      const lbImg  = document.getElementById('lightbox-gambar');
      const lbCap  = document.getElementById('lightbox-caption');
      const lbTutup = document.getElementById('lightbox-tutup');
      if (!lb) return;

      function bukaLightbox(src, judul) {
        lbImg.src = src;
        lbImg.alt = judul || 'Foto galeri';
        lbCap.textContent = judul || '';
        lbCap.style.display = judul ? '' : 'none';
        lb.classList.add('aktif');
        document.body.style.overflow = 'hidden';
      }

      function tutupLightbox() {
        lb.classList.remove('aktif');
        document.body.style.overflow = '';
        // Tunda reset src agar transisi selesai
        setTimeout(() => { lbImg.src = ''; }, 300);
      }

      lbTutup.addEventListener('click', tutupLightbox);
      lb.addEventListener('click', function(e) {
        if (e.target === lb) tutupLightbox();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lb.classList.contains('aktif')) tutupLightbox();
      });

      // Ekspos fungsi buka ke scope global agar render galeri bisa memanggilnya
      window.bukaLightbox = bukaLightbox;
    })();

    /* =====================================================
       INTERSECTION OBSERVER — reveal animasi saat scroll
       =====================================================
       Kelas .akan-reveal hanya ditambahkan lewat JS ini.
       Bila JS tidak jalan, elemen tetap terlihat (opacity default 1).
       prefers-reduced-motion: observer tidak ditambahkan,
       kelas tidak ditambahkan — elemen selalu terlihat.
    */
    let observer = null;

    function initReveal() {
      // Jangan aktifkan animasi bila prefers-reduced-motion
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;

      observer = new IntersectionObserver(
        function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('sudah-reveal');
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
      );
    }

    /** Daftarkan elemen ke observer reveal. */
    function daftarReveal(el) {
      if (!observer || !el) return;
      el.classList.add('akan-reveal');
      observer.observe(el);
    }

    function renderKartuKarya(elId, seksiId, daftar) {

      if (!el) return;
      if (!daftar || daftar.length === 0) {

      if (!el) return;
      if (!daftar || daftar.length === 0) {

      // URL thumbnail: sz=w1000 — ASUMSI: file Drive sudah diatur publik.

      el.innerHTML = daftar.map(item => {
        const thumbUrl = `https://drive.google.com/thumbnail?id=${encodeURIComponent(item.file_id)}&sz=w1000`;
        const judul    = escHtml(item.judul || '');
        const ket      = item.keterangan ? escHtml(item.keterangan) : '';
        return `
          <div class="galeri-item"
               role="button"
               tabindex="0"
               aria-label="Perbesar gambar: ${judul}"
               data-src="${thumbUrl}"
               data-judul="${judul}">

              <img
                class="galeri-item__gambar"
                src="${thumbUrl}"
                alt="${judul || 'Foto galeri'}"
                loading="lazy"
                onerror="this.src='';this.alt='Gambar tidak tersedia';"
              >
              <div class="galeri-item__overlay" aria-hidden="true">
                <div class="galeri-item__overlay-teks">${judul}</div>
              </div>
            </div>
            ${judul || ket ? `
            <div class="galeri-item__info">
              ${judul ? `<div class="galeri-item__judul">${judul}</div>` : ''}
              ${ket   ? `<div class="galeri-item__keterangan">${ket}</div>` : ''}
            </div>` : ''}
          </div>`;
      }).join('');

      // Event klik lightbox
      el.addEventListener('click', function(e) {
        const item = e.target.closest('.galeri-item[data-src]');
        if (item && window.bukaLightbox) {
          window.bukaLightbox(item.dataset.src, item.dataset.judul);
        }
      });

      // Aksesibilitas: Enter/Space pada item galeri
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          const item = e.target.closest('.galeri-item[data-src]');
          if (item && window.bukaLightbox) {
            e.preventDefault();
            window.bukaLightbox(item.dataset.src, item.dataset.judul);
          }
        }
      });

      // Reveal per item
      el.querySelectorAll('.galeri-item').forEach((item, i) => {
        item.style.transitionDelay = `${i * 50}ms`;
        daftarReveal(item);
      });
      if (seksi) daftarReveal(seksi.querySelector('.seksi__judul'));
    }

    /* =====================================================
       GENERATE CV — PDF CLIENT-SIDE via pdfmake
       =====================================================
       Membaca _cvData yang sudah diisi oleh init().
       Tidak ada fetch ulang, tidak ada gambar/foto di-embed
       (menghindari masalah CORS tainted-canvas).
       Galeri DIKECUALIKAN sepenuhnya.
       WAJIB DIUJI DI BROWSER: rendering font Roboto pdfmake,
       multi-halaman, dan download blob.
    */
    function generateCV() {
      // --- Cek library pdfmake ---
      if (typeof pdfMake === 'undefined') {
        tampilToast('Gagal memuat library PDF. Periksa koneksi internet dan muat ulang halaman.', 'gagal', 6000);
        return;
      }

      // --- Cek data tersedia ---
      if (!_cvData) {
        tampilToast('Data CV belum tersedia. Tunggu hingga profil selesai dimuat.', 'gagal');
        return;
      }

      const { profil = {}, penelitian = [], pengabdian = [], dokumen = [] } = _cvData;

      // Penyusunan nama+gelar — SAMA persis dengan pola renderHero & renderKontak
      const namaLengkap   = profil.nama_lengkap   || '';
      const gelarDepan    = profil.gelar_depan    || '';
      const gelarBelakang = profil.gelar_belakang || '';
      const namaGelar     = [gelarDepan, namaLengkap, gelarBelakang].filter(Boolean).join(' ');

      // Cek minimal: nama atau ada konten penelitian/pengabdian
      const adaKonten = Boolean(namaGelar) || penelitian.length > 0 || pengabdian.length > 0;
      if (!adaKonten) {
        tampilToast('Data CV belum tersedia. Profil masih kosong.', 'gagal');
        return;
      }

      // --- Indikator loading pada tombol ---
      const btnCV = document.getElementById('btn-unduh-cv');

      // Fungsi reset idempoten — aman dipanggil berkali-kali tanpa glitch
      let sudahReset = false;
      function resetTombolCV() {
        if (sudahReset) return;
        sudahReset = true;
        if (btnCV) {
          btnCV.classList.remove('cta-btn--cv-loading');
          btnCV.innerHTML = ikonUnduhCV() + ' Unduh CV';
        }
      }

      if (btnCV) {
        btnCV.classList.add('cta-btn--cv-loading');
        btnCV.innerHTML = 'Menyiapkan...';
      }

      // --- Warna tema navy + teal ---
      const NAVY_UTAMA  = '#1E3A5F';
      const TEAL_AKSEN  = '#0F766E';
      const EMAS_AKSEN  = '#C9A227';
      const ABU_MUDA    = '#5A6B7B';

      // --- Helper: baris garis pemisah seksi ---
      function garisSeksi() {
        return {
          canvas: [{
            type: 'line',
            x1: 0, y1: 0, x2: 515, y2: 0,
            lineWidth: 1.5,
            lineColor: TEAL_AKSEN
          }],
          margin: [0, 0, 0, 8]
        };
      }

      // --- Helper: judul seksi ---
      function judulSeksi(teks) {
        return [
          {
            text: teks,
            style: 'judulSeksi',
            margin: [0, 18, 0, 4]
          },
          garisSeksi()
        ];
      }

      // --- Konten dokumen: definisi isi PDF ---
      const content = [];

      // == HEADER: nama + gelar ==
      content.push({
        text: namaGelar || 'Personal Website',
        style: 'namaHeader',
        margin: [0, 0, 0, 4]
      });

      // == Profesi & jabatan ==
      const profesiTeks = [profil.profesi, profil.jabatan].filter(Boolean).join(' · ');
      if (profesiTeks) {
        content.push({ text: profesiTeks, style: 'profesiHeader', margin: [0, 0, 0, 2] });
      }

      // == Institusi ==
      if (profil.institusi) {
        content.push({ text: profil.institusi, style: 'institusiHeader', margin: [0, 0, 0, 2] });
      }

      // == Garis emas tipis langsung di bawah nama (aksen dekoratif, bukan teks) ==
      content.push({
        canvas: [{
          type: 'line',
          x1: 0, y1: 0, x2: 515, y2: 0,
          lineWidth: 2,
          lineColor: EMAS_AKSEN
        }],
        margin: [0, 6, 0, 6]
      });

      // == Baris kontak ringkas (email · NUPTK) ==
      const kontakBaris = [];
      if (profil.email_publik) kontakBaris.push('Email: ' + profil.email_publik);
      if (profil.nuptk)        kontakBaris.push('NUPTK: ' + profil.nuptk);
      if (kontakBaris.length > 0) {
        content.push({
          text: kontakBaris.join('   ·   '),
          style: 'kontakBaris',
          margin: [0, 0, 0, 4]
        });
      }

      // == Tautan sosmed / akademik ==
      const sosmedTerisi = SOSMED_DEF.filter(s => profil[s.key]);
      if (sosmedTerisi.length > 0) {
        const barisSosmed = sosmedTerisi.map(s => ({
          text: s.label + ': ' + profil[s.key],
          style: 'sosmedBaris',
          margin: [0, 1, 0, 0]
        }));
        content.push(...barisSosmed);
      }

      // == Ringkasan / Bio ==
      const bio = (profil.bio || '').trim();
      if (bio) {
        content.push(...judulSeksi('Ringkasan'));
        content.push({ text: bio, style: 'isiTeks', margin: [0, 0, 0, 4] });
      }

      // == Penelitian ==
      if (penelitian.length > 0) {
        content.push(...judulSeksi('Penelitian'));
        penelitian.forEach(function(item) {
          const baris = [];
          baris.push({ text: item.judul || '—', style: 'itemJudul', margin: [0, 0, 0, 2] });
          const meta = [];
          if (item.tahun) meta.push('Tahun: ' + item.tahun);
          if (item.link)  meta.push('Tautan: ' + item.link);
          if (meta.length > 0) {
            baris.push({ text: meta.join('   '), style: 'itemMeta', margin: [0, 0, 0, 1] });
          }
          baris.push({ text: '', margin: [0, 0, 0, 6] }); // spasi antar item
          content.push(...baris);
        });
      }

      // == Pengabdian Masyarakat ==
      if (pengabdian.length > 0) {
        content.push(...judulSeksi('Pengabdian Masyarakat'));
        pengabdian.forEach(function(item) {
          const baris = [];
          baris.push({ text: item.judul || '—', style: 'itemJudul', margin: [0, 0, 0, 2] });
          const meta = [];
          if (item.tahun) meta.push('Tahun: ' + item.tahun);
          if (item.link)  meta.push('Tautan: ' + item.link);
          if (meta.length > 0) {
            baris.push({ text: meta.join('   '), style: 'itemMeta', margin: [0, 0, 0, 1] });
          }
          baris.push({ text: '', margin: [0, 0, 0, 6] });
          content.push(...baris);
        });
      }

      // == Dokumen ==
      if (dokumen.length > 0) {
        content.push(...judulSeksi('Dokumen'));
        dokumen.forEach(function(item) {
          const baris = [];
          baris.push({ text: item.judul || '—', style: 'itemJudul', margin: [0, 0, 0, 2] });
          if (item.jenis) {
            baris.push({ text: 'Jenis: ' + item.jenis, style: 'itemMeta', margin: [0, 0, 0, 1] });
          }
          baris.push({ text: '', margin: [0, 0, 0, 6] });
          content.push(...baris);
        });
      }

      // == Footer kecil (tanggal unduh) ==
      const tglUnduh = new Date().toLocaleDateString('id-ID', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
      content.push({
        text: 'Diunduh dari profil online — ' + tglUnduh,
        style: 'footerTeks',
        margin: [0, 28, 0, 0],
        alignment: 'center'
      });

      // --- Definisi dokumen pdfmake ---
      const docDef = {
        pageSize: 'A4',
        pageMargins: [50, 50, 50, 50],
        content: content,
        styles: {
          namaHeader: {
            fontSize: 22,
            bold: true,
            color: NAVY_UTAMA,
            font: 'Roboto'
          },
          profesiHeader: {
            fontSize: 12,
            color: '#1A2433',
            font: 'Roboto'
          },
          institusiHeader: {
            fontSize: 11,
            color: ABU_MUDA,
            font: 'Roboto'
          },
          kontakBaris: {
            fontSize: 10,
            color: '#1A2433',
            font: 'Roboto'
          },
          sosmedBaris: {
            fontSize: 9.5,
            color: NAVY_UTAMA,
            font: 'Roboto'
          },
          judulSeksi: {
            fontSize: 13,
            bold: true,
            color: NAVY_UTAMA,
            font: 'Roboto'
          },
          isiTeks: {
            fontSize: 10.5,
            color: '#1A2433',
            lineHeight: 1.5,
            font: 'Roboto'
          },
          itemJudul: {
            fontSize: 10.5,
            bold: true,
            color: '#1A2433',
            font: 'Roboto'
          },
          itemMeta: {
            fontSize: 9.5,
            color: ABU_MUDA,
            font: 'Roboto'
          },
          footerTeks: {
            fontSize: 8.5,
            color: '#8A9BAD',
            font: 'Roboto',
            italics: true
          }
        },
        defaultStyle: {
          font: 'Roboto',
          fontSize: 10.5,
          color: '#1A2433',
          lineHeight: 1.4
        }
      };

      // --- Nama file: bersihkan karakter ilegal nama file ---
      function bersihkanNamaFile(nama) {
        // Hapus karakter yang tidak aman untuk nama file di semua OS
        return nama.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, ' ').trim();
      }
      const namaFile = namaLengkap
        ? 'CV - ' + bersihkanNamaFile(namaLengkap) + '.pdf'
        : 'CV.pdf';

      // --- Buat & unduh PDF (WAJIB DIUJI DI BROWSER) ---
      try {
        pdfMake.createPdf(docDef).download(namaFile, function() {
          // Callback dipanggil setelah download dimulai (ASUMSI: API pdfmake 0.2).
          // Tidak dijamin terpanggil di semua browser/mobile — ada fallback setTimeout di bawah.
          resetTombolCV();
        });
        // Fallback: bila callback .download() tidak terpanggil (mis. mobile, kegagalan font
        // diam-diam), tombol tetap pulih setelah 8 detik.
        setTimeout(resetTombolCV, 8000);
      } catch (errPdf) {
        tampilToast('Gagal membuat PDF: ' + (errPdf.message || 'Kesalahan tidak diketahui.'), 'gagal', 6000);
        resetTombolCV();
        console.error('[generateCV] Error pdfmake:', errPdf);
      }
    }

    /** SVG ikon unduh — dipakai di tombol CV. */
    function ikonUnduhCV() {
      return `<svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" style="flex-shrink:0;">
        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>`;
    }

    /* =====================================================
       INISIALISASI UTAMA
       ===================================================== */
    async function init() {
      // Inisialisasi IntersectionObserver
      initReveal();

      // Cek placeholder API_URL
      if (!API_URL || API_URL === API_URL_PLACEHOLDER) {
        tampilErrorHero(
          'URL API belum dikonfigurasi. ' +
          'Isi konstanta API_URL di bagian <script> index.html dengan URL Web App Google Apps Script Anda.'
        );
        return;
      }

      try {
        // Ambil data publik dari GAS
        // Pola CORS: POST, Content-Type text/plain, body JSON.
        // Token tidak diperlukan untuk getPublic.
        const hasil = await apiPublik();

        if (!hasil.ok) {
          tampilToast('Gagal memuat data: ' + (hasil.pesan || 'Kesalahan tidak diketahui.'), 'gagal');
          tampilErrorHero(hasil.pesan || 'Kesalahan server.');
          return;
        }

        const { profil = {}, penelitian = [], pengabdian = [], galeri = [], dokumen = [] } = hasil.data || {};

        // Simpan data ke scope luar agar generateCV() dapat mengaksesnya tanpa fetch ulang
        _cvData = { profil, penelitian, pengabdian, dokumen };

        renderHero(profil);
        renderBio(profil);
        renderPenelitian(penelitian);
        renderPengabdian(pengabdian);
        renderGaleri(galeri);
        renderDokumen(dokumen);
        renderKontak(profil);

      } catch (err) {
        // Kemungkinan: CORS gagal, jaringan, GAS tidak merespons
        tampilToast('Tidak dapat terhubung ke server. Periksa koneksi Anda.', 'gagal');
        tampilErrorHero('Tidak dapat terhubung ke server. Periksa koneksi internet atau pastikan URL API sudah benar.');
        console.error('[Profil Publik] Error:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
